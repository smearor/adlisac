[options]
library = "Casilda"
version = "1.0"
min_cfg_version = "1.0"
target_path = "."
girs_directories = ["../gir-files", "/usr/share/gir-1.0", "/usr/local/share/gir-1.0"]
work_mode = "normal"
single_version_file = true
generate_safety_asserts = true
deprecate_by_min_version = true
generate_builder = true

#external_libraries = [
#    "GLib",
#    "GObject",
#    "Gdk",
#    "Gtk",
#]

[[external_library]]
namespace = "GLib"
crate_name = "glib"

[[external_library]]
namespace = "GObject"
crate_name = "gobject"

[[external_library]]
namespace = "Gdk"
crate_name = "gdk4"

[[external_library]]
namespace = "Gtk"
crate_name = "gtk4"

[[object]]
name = "Casilda.Compositor"
status = "generate"
final_type = true

[[object.function]]
name = "spawn_async"
ignore = true

